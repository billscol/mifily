name: mifily

services:
  app:
    image: ghcr.io/billscol/mifily:latest
    container_name: mifily_app
    restart: unless-stopped
    env_file: .env
    extra_hosts:
      - "host.docker.internal:host-gateway" # reach the host's MariaDB
    ports:
      - "127.0.0.1:3010:3000"
    networks:
      - mifily_net

  minio:
    image: minio/minio:latest
    container_name: mifily_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    ports:
      - "127.0.0.1:3011:9000"
      - "127.0.0.1:3012:9001"
    networks:
      - mifily_net
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: mifily_minio_init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      STORAGE_PUBLIC_BUCKET: ${STORAGE_PUBLIC_BUCKET}
      STORAGE_PRIVATE_BUCKET: ${STORAGE_PRIVATE_BUCKET}
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD &&
      mc mb --ignore-existing local/$$STORAGE_PUBLIC_BUCKET &&
      mc mb --ignore-existing local/$$STORAGE_PRIVATE_BUCKET &&
      mc anonymous set download local/$$STORAGE_PUBLIC_BUCKET
      "
    networks:
      - mifily_net
    restart: "no"

  # Reemplaza los Vercel Cron Jobs del vercel.json original: llama a los
  # endpoints /api/cron/* directamente por la red interna de Docker (nunca
  # sale a internet, así que no depende de CRON_SECRET para estar protegido).
  cron:
    image: alpine:3.20
    container_name: mifily_cron
    restart: unless-stopped
    depends_on:
      - app
    environment:
      CRON_SECRET: ${CRON_SECRET}
      APP_URL: http://app:3000
    volumes:
      - ./deploy/crontab.template:/etc/crontabs/root.template:ro
    entrypoint: >
      /bin/sh -c "
      apk add --no-cache curl gettext >/dev/null 2>&1 &&
      envsubst < /etc/crontabs/root.template > /etc/crontabs/root &&
      crond -f -l 2
      "
    networks:
      - mifily_net

networks:
  mifily_net:
    driver: bridge

volumes:
  minio_data:
